{% extends "base.html" %}
{% block title %}UPI Security Suite - Terminal Registration{% endblock %}
{% block auth_content %}
<div class="auth-wrapper">
    <div class="glass-panel auth-card">
        <div class="auth-header">
            <div class="auth-logo" style="color: var(--primary); text-shadow: 0 0 15px var(--primary-glow);">
                <i data-lucide="terminal"></i>
            </div>
            <h2>Register Terminal</h2>
            <p class="auth-subtitle">Initialize Security Operator Credentials</p>
        </div>

        <form action="{{ url_for('auth_register') }}" method="POST">
            <div class="form-group">
                <label for="username" class="form-label">Operator Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Choose operator ID" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="email" class="form-label">Security Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="operator@upisecure.org" required>
            </div>
            
            <div class="form-group">
                <label for="role" class="form-label">Assigned Security Role</label>
                <select id="role" name="role" class="form-control">
                    <option value="User">Standard Security Analyst</option>
                    <option value="Administrator">Lead Administrator</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Access Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                <i data-lucide="user-plus"></i>
                <span>Register Terminal</span>
            </button>
        </form>

        <div class="auth-footer">
            <p>Already registered? <a href="{{ url_for('auth_login') }}">Authenticate login</a></p>
        </div>
    </div>
</div>
{% endblock %}
